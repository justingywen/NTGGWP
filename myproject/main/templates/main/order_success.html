<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>訂單完成</title>
    <style>
      body {
        font-family: "Microsoft JhengHei", sans-serif;
        background: #f7f8fb;
        margin: 0;
        color: #1f2937;
      }

      .container {
        max-width: 700px;
        margin: 70px auto;
        padding: 20px;
      }

      .card {
        background: white;
        border-radius: 20px;
        padding: 36px;
        box-shadow: 0 10px 28px rgba(15, 23, 42, 0.08);
        text-align: center;
      }

      h1 {
        margin-top: 0;
        font-size: 34px;
        color: #16a34a;
      }

      .info {
        margin: 14px 0;
        font-size: 18px;
      }

      .price {
        font-size: 24px;
        font-weight: bold;
        color: #2563eb;
      }

      .btn {
        display: inline-block;
        margin-top: 24px;
        background: #2563eb;
        color: white;
        padding: 12px 22px;
        border-radius: 12px;
        text-decoration: none;
        font-weight: bold;
      }

      .btn-dark {
        background: #1f2937;
      }
    </style>
  </head>
  <body>
    {% include 'main/partials/navbar.html' %}

    <div class="container">
      <div class="card">
        <h1>購買成功</h1>

        <div class="info">
          你已成功購買課程：<strong>{{ order.course.title }}</strong>
        </div>

        <div class="info">原價：NT$ {{ order.original_price }}</div>

        <div class="info">折扣：NT$ {{ order.discount_amount }}</div>

        <div class="info price">實付金額：NT$ {{ order.final_price }}</div>

        {% if order.coupon %}
        <div class="info">使用優惠券：{{ order.coupon.code }}</div>
        {% endif %}

        <a href="{% url 'my_courses' %}" class="btn">前往我的課程</a>
        <a href="/" class="btn btn-dark">回首頁</a>
      </div>
    </div>
  </body>
</html>

{% extends 'main/base_eduflow.html' %}
{% block title %}編輯課程 | EduFlow{% endblock %}

{% block content %}
<main class="max-w-xl mx-auto px-4 py-12">
  <div class="bg-white rounded-2xl ring-1 ring-slate-100 shadow-sm p-8 ef-form">
    <h1 class="text-2xl font-black text-slate-900 mb-1">編輯課程</h1>
    <p class="text-slate-500 mb-4">正在編輯：<strong class="text-slate-800">{{ course.title }}</strong></p>
    <form method="post" enctype="multipart/form-data">
      {% csrf_token %}
      {{ form.as_p }}
      <button type="submit" class="w-full bg-brand-600 hover:bg-brand-700 text-white font-bold py-3 rounded-lg transition mt-2">儲存修改</button>
    </form>
    <a href="{% url 'teacher_dashboard' %}" class="inline-block mt-4 text-brand-600 hover:underline font-medium">← 回教師專區</a>
  </div>
</main>
{% endblock %}

<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>編輯課程</title>
    {% include 'main/partials/glass_head.html' %}
    <style>
      .container { max-width: 620px; margin: 44px auto; padding: 0 20px; }
      .card { padding: 32px; }
      h1 { margin: 0 0 6px; font-size: 26px; font-weight: 800; }
      .sub { color: var(--ink-soft); margin-bottom: 16px; }
      form p { margin-bottom: 14px; }
      label { display: block; margin-bottom: 6px; font-weight: 700; }
      input, textarea, select { width: 100%; padding: 11px; border: 1px solid rgba(255,255,255,0.7); border-radius: 10px; font-size: 15px; box-sizing: border-box; background: rgba(255,255,255,0.65); }
      .helptext { color: var(--ink-soft); font-size: 13px; }
      .back { display: inline-block; margin-top: 14px; color: #4338ca; text-decoration: none; font-weight: 600; }
    </style>
  </head>
  <body>
    {% include 'main/partials/navbar.html' %}
    <div class="container">
      <div class="glass card">
        <h1>編輯課程</h1>
        <div class="sub">正在編輯：<strong>{{ course.title }}</strong></div>
        <form method="post" enctype="multipart/form-data">
          {% csrf_token %} {{ form.as_p }}
          <button type="submit" class="glass-btn" style="width:100%;">儲存修改</button>
        </form>
        <a href="{% url 'teacher_dashboard' %}" class="back">← 回教師專區</a>
      </div>
    </div>
  </body>
</html>

<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>老師課程分析</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    {% include 'main/partials/glass_head.html' %}
    <style>
      .container { max-width: 1200px; margin: 40px auto; padding: 0 20px; }
      .card { padding: 30px; margin-bottom: 22px; }
      h1 { margin: 0 0 6px; font-size: 28px; font-weight: 800; }
      h2 { margin: 0 0 14px; font-size: 19px; font-weight: 800; }
      p.sub { color: var(--ink-soft); margin: 0 0 18px; }
      .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 18px; }
      .stat-box { padding: 22px; }
      .stat-box h3 { margin: 0 0 8px; font-size: 15px; color: var(--ink-soft); }
      .number { font-size: 30px; color: #4338ca; font-weight: 800; }
      .chart-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(420px, 1fr)); gap: 22px; }
      .chart-wrap { position: relative; height: 300px; }
    </style>
  </head>
  <body>
    {% include 'main/partials/navbar.html' %}
    <div class="container">
      <div class="glass card">
        <h1>老師課程分析</h1>
        <p class="sub">依課程訂單、觀看紀錄與評價即時產生分析圖表。</p>
        <div class="stats">
          <div class="glass-strong stat-box"><h3>總營收</h3><div class="number">NT$ {{ total_revenue }}</div></div>
          <div class="glass-strong stat-box"><h3>總購買數</h3><div class="number">{{ total_purchase_count }}</div></div>
          <div class="glass-strong stat-box"><h3>總觀看分鐘</h3><div class="number">{{ total_watch_minutes }}</div></div>
        </div>
      </div>

      <div class="chart-grid">
        <div class="glass card"><h2>各課程購買數</h2><div class="chart-wrap"><canvas id="purchaseChart"></canvas></div></div>
        <div class="glass card"><h2>各課程營收</h2><div class="chart-wrap"><canvas id="revenueChart"></canvas></div></div>
        <div class="glass card"><h2>各課程觀看分鐘</h2><div class="chart-wrap"><canvas id="watchChart"></canvas></div></div>
        <div class="glass card"><h2>各課程平均評分</h2><div class="chart-wrap"><canvas id="ratingChart"></canvas></div></div>
      </div>

      <div class="glass card">
        <a href="{% url 'teacher_dashboard' %}" class="glass-btn ghost">回老師首頁</a>
      </div>
    </div>

    <script>
      const courseLabels = {{ course_labels_json|safe }};
      const purchaseCounts = {{ purchase_counts_json|safe }};
      const revenueData = {{ revenue_data_json|safe }};
      const watchMinutesData = {{ watch_minutes_data_json|safe }};
      const ratingData = {{ rating_data_json|safe }};
      const opts = { responsive: true, maintainAspectRatio: false };
      function bar(id, label, data, color, extra) {
        new Chart(document.getElementById(id), {
          type: "bar",
          data: { labels: courseLabels, datasets: [{ label: label, data: data, backgroundColor: color, borderRadius: 6 }] },
          options: Object.assign({}, opts, extra || {})
        });
      }
      bar("purchaseChart", "購買數", purchaseCounts, "#4f46e5");
      bar("revenueChart", "營收", revenueData, "#7c3aed");
      bar("watchChart", "觀看分鐘", watchMinutesData, "#ec4899");
      bar("ratingChart", "平均評分", ratingData, "#f59e0b", { scales: { y: { min: 0, max: 5 } } });
    </script>
  </body>
</html>

<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>我的收藏</title>
    {% include 'main/partials/glass_head.html' %}
    <style>
      .container { max-width: 1040px; margin: 40px auto; padding: 0 20px; }
      h1 { font-size: 28px; font-weight: 800; margin-bottom: 20px; }
      .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }
      .fav { padding: 20px; display: flex; flex-direction: column; gap: 8px; }
      .f-title { font-weight: 800; font-size: 18px; }
      .f-meta { color: var(--ink-soft); font-size: 14px; }
      .f-price { color: #4338ca; font-weight: 800; }
      .actions { display: flex; gap: 8px; margin-top: auto; padding-top: 10px; }
      .actions > * { flex: 1; }
      .actions .glass-btn { text-align: center; padding: 10px; font-size: 14px; }
      .empty { padding: 40px; text-align: center; color: var(--ink-soft); }
    </style>
  </head>
  <body>
    {% include 'main/partials/navbar.html' %}
    <div class="container">
      <h1>我的收藏</h1>
      {% if favorites %}
      <div class="grid">
        {% for fav in favorites %}
        <div class="glass fav">
          <div class="f-title">{{ fav.course.title }}</div>
          <div class="f-meta">講師：{{ fav.course.teacher.username }}</div>
          <div class="f-price">NT$ {{ fav.course.price }}</div>
          <div class="actions">
            <a href="{% url 'course_detail' fav.course.id %}" class="glass-btn">看課程</a>
            <form method="post" action="{% url 'toggle_favorite' fav.course.id %}">
              {% csrf_token %}
              <input type="hidden" name="next" value="{% url 'my_favorites' %}" />
              <button type="submit" class="glass-btn danger" style="width:100%;">取消收藏</button>
            </form>
          </div>
        </div>
        {% endfor %}
      </div>
      {% else %}
      <div class="glass empty">你還沒有收藏任何課程。</div>
      {% endif %}
    </div>
  </body>
</html>

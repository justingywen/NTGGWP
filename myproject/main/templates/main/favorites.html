<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>我的收藏</title>
    <style>
      body { font-family: "Microsoft JhengHei", sans-serif; background: #f5f7fb; margin: 0; color: #222; }
      .container { max-width: 1000px; margin: 0 auto; padding: 40px 20px; }
      h1 { color: #111827; }
      .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }
      .fav { background: #fff; border-radius: 16px; padding: 20px; box-shadow: 0 8px 20px rgba(0,0,0,.06); display: flex; flex-direction: column; gap: 10px; }
      .f-title { font-weight: bold; color: #111827; font-size: 18px; }
      .f-meta { color: #6b7280; font-size: 14px; }
      .f-price { color: #2563eb; font-weight: bold; }
      .actions { display: flex; gap: 10px; margin-top: auto; }
      .btn { flex: 1; text-align: center; background: #2563eb; color: #fff; padding: 10px; border-radius: 10px; text-decoration: none; font-weight: bold; border: none; cursor: pointer; }
      .btn-out { background: #ef4444; }
      .empty { color: #6b7280; }
    </style>
  </head>
  <body>
    {% include 'main/partials/navbar.html' %}
    <div class="container">
      <h1>我的收藏</h1>
      {% if favorites %}
      <div class="grid">
        {% for fav in favorites %}
        <div class="fav">
          <div class="f-title">{{ fav.course.title }}</div>
          <div class="f-meta">講師：{{ fav.course.teacher.username }}</div>
          <div class="f-price">NT$ {{ fav.course.price }}</div>
          <div class="actions">
            <a href="{% url 'course_detail' fav.course.id %}" class="btn">看課程</a>
            <form method="post" action="{% url 'toggle_favorite' fav.course.id %}" style="flex:1;">
              {% csrf_token %}
              <input type="hidden" name="next" value="{% url 'my_favorites' %}" />
              <button type="submit" class="btn btn-out">取消收藏</button>
            </form>
          </div>
        </div>
        {% endfor %}
      </div>
      {% else %}
      <p class="empty">你還沒有收藏任何課程。</p>
      {% endif %}
    </div>
  </body>
</html>

{% extends 'main/base_eduflow.html' %}
{% block title %}忘記密碼 | EduFlow{% endblock %}

{% block content %}
<main class="max-w-md mx-auto px-4 py-14">
  <div class="bg-white rounded-2xl ring-1 ring-slate-100 shadow-sm p-8">
    <h1 class="text-2xl font-black text-slate-900 mb-1">忘記密碼</h1>
    <p class="text-slate-500 mb-6">輸入你註冊時使用的 Gmail，我們會寄送重設密碼的連結給你。</p>
    <div class="ef-form">
      <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="w-full bg-brand-600 hover:bg-brand-700 text-white font-bold py-3 rounded-lg transition mt-2">寄送重設連結</button>
      </form>
    </div>
    <a href="{% url 'login' %}" class="block text-center text-brand-600 hover:underline text-sm mt-4">← 回登入頁</a>
  </div>
</main>
{% endblock %}

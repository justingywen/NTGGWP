<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>忘記密碼</title>
    {% include 'main/partials/glass_head.html' %}
    <style>
      .container { max-width: 480px; margin: 56px auto; padding: 0 20px; }
      .card { padding: 32px; }
      h1 { margin: 0 0 12px; font-size: 26px; font-weight: 800; }
      p { color: var(--ink-soft); line-height: 1.8; margin-bottom: 18px; }
      input { width: 100%; padding: 12px 14px; border: 1px solid rgba(255,255,255,0.7); border-radius: 10px; font-size: 16px; margin-bottom: 14px; box-sizing: border-box; background: rgba(255,255,255,0.65); }
      .back { display: inline-block; margin-top: 16px; color: #4338ca; text-decoration: none; font-weight: 600; }
    </style>
  </head>
  <body>
    {% include 'main/partials/navbar.html' %}
    <div class="container">
      <div class="glass card">
        <h1>忘記密碼</h1>
        <p>輸入你註冊時使用的 Gmail，我們會寄送重設密碼的連結給你。</p>
        <form method="post">
          {% csrf_token %} {{ form.as_p }}
          <button type="submit" class="glass-btn" style="width:100%;">寄送重設連結</button>
        </form>
        <a href="{% url 'login' %}" class="back">← 回登入頁</a>
      </div>
    </div>
  </body>
</html>

{% extends 'main/base_eduflow.html' %}
{% block title %}註冊成功 | EduFlow{% endblock %}

{% block content %}
<main class="max-w-md mx-auto px-4 py-16">
  <div class="bg-white rounded-2xl ring-1 ring-slate-100 shadow-sm p-10 text-center">
    <div class="text-5xl mb-3">🎉</div>
    <h1 class="text-2xl font-black text-slate-900 mb-2">註冊成功</h1>
    <p class="text-slate-500 mb-6">你的帳號已建立完成，現在可以登入並開始探索課程。</p>
    <div class="flex gap-3 justify-center flex-wrap">
      <a href="{% url 'login' %}" class="bg-brand-600 hover:bg-brand-700 text-white font-bold px-6 py-3 rounded-lg transition">前往登入</a>
      <a href="{% url 'home' %}#courses" class="bg-slate-100 hover:bg-slate-200 text-slate-700 font-bold px-6 py-3 rounded-lg transition">瀏覽課程</a>
    </div>
  </div>
</main>
{% endblock %}

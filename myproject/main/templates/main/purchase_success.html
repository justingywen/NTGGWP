<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>購買成功</title>
    {% include 'main/partials/glass_head.html' %}
    <style>
      .container { max-width: 560px; margin: 66px auto; padding: 0 20px; }
      .card { padding: 40px; text-align: center; }
      .icon { font-size: 52px; }
      h1 { margin: 10px 0; font-size: 26px; font-weight: 800; }
      p { color: var(--ink-soft); line-height: 1.8; font-size: 16px; }
    </style>
  </head>
  <body>
    {% include 'main/partials/navbar.html' %}
    <div class="container">
      <div class="glass card">
        <div class="icon">✅</div>
        <h1>購買成功</h1>
        <p>你已成功購買課程：<strong>{{ course.title }}</strong></p>
        <div style="margin-top:18px; display:flex; gap:10px; justify-content:center; flex-wrap:wrap;">
          <a href="{% url 'my_courses' %}" class="glass-btn">我的課程</a>
          <a href="{% url 'home' %}" class="glass-btn ghost">回首頁</a>
        </div>
      </div>
    </div>
  </body>
</html>

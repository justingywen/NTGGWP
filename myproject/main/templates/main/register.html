{% extends 'main/base_eduflow.html' %}
{% block title %}註冊帳號 | EduFlow{% endblock %}

{% block content %}
<main class="max-w-md mx-auto px-4 py-14">
  <div class="bg-white rounded-2xl ring-1 ring-slate-100 shadow-sm p-8">
    <h1 class="text-2xl font-black text-slate-900 mb-1">註冊帳號</h1>
    <p class="text-slate-500 mb-6">填寫帳號資訊，並選擇你的身分是學生或老師。</p>
    <div class="ef-form">
      <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="w-full bg-brand-600 hover:bg-brand-700 text-white font-bold py-3 rounded-lg transition mt-2">註冊</button>
      </form>
    </div>
    <p class="text-sm text-slate-500 mt-4 text-center">已經有帳號了？<a href="{% url 'login' %}" class="text-brand-600 hover:underline">前往登入</a></p>
  </div>
</main>
{% endblock %}

<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>編輯單元</title>
    {% include 'main/partials/glass_head.html' %}
    <style>
      .container { max-width: 560px; margin: 44px auto; padding: 0 20px; }
      .card { padding: 30px; }
      h1 { margin: 0 0 12px; font-size: 24px; font-weight: 800; }
      .cur-vid { color: #16a34a; font-weight: 700; margin-bottom: 10px; }
      p, label { display: block; margin-top: 12px; font-weight: 700; color: #334155; }
      input, textarea { width: 100%; padding: 10px; border: 1px solid rgba(255,255,255,0.7); border-radius: 8px; box-sizing: border-box; margin-top: 4px; background: rgba(255,255,255,0.65); }
      .btn-row { margin-top: 16px; display: flex; gap: 10px; align-items: center; }
    </style>
  </head>
  <body>
    {% include 'main/partials/navbar.html' %}
    <div class="container">
      <div class="glass card">
        <h1>編輯單元</h1>
        {% if lesson.video_file %}<p class="cur-vid">🎬 目前已上傳：{{ lesson.video_file.name }}</p>{% endif %}
        <form method="post" enctype="multipart/form-data">
          {% csrf_token %}
          {{ form.as_p }}
          <div class="btn-row">
            <button type="submit" class="glass-btn">儲存</button>
            <a href="{% url 'manage_content' course.id %}" class="glass-btn ghost">取消</a>
          </div>
        </form>
      </div>
    </div>
  </body>
</html>

<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>購物車</title>
    <style>
      body { font-family: "Microsoft JhengHei", sans-serif; background: #f5f7fb; margin: 0; color: #222; }
      .container { max-width: 900px; margin: 0 auto; padding: 40px 20px; }
      .card { background: #fff; border-radius: 18px; padding: 30px; box-shadow: 0 10px 25px rgba(0,0,0,.08); }
      h1 { margin-top: 0; color: #111827; }
      .row { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #e5e7eb; padding: 16px 0; gap: 12px; }
      .row:last-of-type { border-bottom: none; }
      .c-title { font-weight: bold; color: #111827; }
      .c-meta { color: #6b7280; font-size: 14px; }
      .c-price { color: #2563eb; font-weight: bold; font-size: 18px; }
      .btn { display: inline-block; background: #2563eb; color: #fff; padding: 12px 24px; border-radius: 12px; text-decoration: none; font-weight: bold; border: none; cursor: pointer; }
      .btn-del { background: #ef4444; padding: 8px 14px; border-radius: 10px; font-size: 14px; }
      .total { text-align: right; font-size: 22px; font-weight: bold; margin: 20px 0; }
      .empty { color: #6b7280; line-height: 1.8; }
      .back { display: inline-block; margin-top: 20px; color: #374151; text-decoration: none; }
    </style>
  </head>
  <body>
    {% include 'main/partials/navbar.html' %}
    <div class="container">
      <div class="card">
        <h1>我的購物車</h1>
        {% if items %}
          {% for item in items %}
          <div class="row">
            <div>
              <div class="c-title">{{ item.course.title }}</div>
              <div class="c-meta">講師：{{ item.course.teacher.username }}</div>
            </div>
            <div class="c-price">NT$ {{ item.course.price }}</div>
            <form method="post" action="{% url 'remove_from_cart' item.id %}">
              {% csrf_token %}
              <button type="submit" class="btn btn-del">移除</button>
            </form>
          </div>
          {% endfor %}
          <div class="total">合計：NT$ {{ total }}</div>
          <form method="post" action="{% url 'cart_checkout' %}">
            {% csrf_token %}
            <input type="text" name="coupon_code" placeholder="輸入優惠碼（可留空，符合條件的促銷會自動套用）"
                   style="width:100%; padding:12px; border:1px solid #d1d5db; border-radius:10px; box-sizing:border-box; margin-bottom:12px;" />
            <button type="submit" class="btn">結帳並開通課程</button>
          </form>
        {% else %}
          <p class="empty">購物車目前是空的。</p>
        {% endif %}
        <a href="{% url 'home' %}" class="back">← 回首頁繼續逛課程</a>
      </div>
    </div>
  </body>
</html>

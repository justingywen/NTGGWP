<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>刪除課程</title>
    {% include 'main/partials/glass_head.html' %}
    <style>
      .container { max-width: 560px; margin: 60px auto; padding: 0 20px; }
      .card { padding: 32px; text-align: center; }
      .icon { font-size: 48px; }
      h1 { margin: 8px 0; font-size: 24px; font-weight: 800; color: #dc2626; }
      p { color: var(--ink-soft); line-height: 1.8; }
      .btn-row { margin-top: 20px; display: flex; gap: 10px; justify-content: center; }
    </style>
  </head>
  <body>
    {% include 'main/partials/navbar.html' %}
    <div class="container">
      <div class="glass card">
        <div class="icon">⚠️</div>
        <h1>刪除課程</h1>
        <p>你確定要刪除「<strong>{{ course.title }}</strong>」嗎？<br />刪除後無法復原。</p>
        <form method="post">
          {% csrf_token %}
          <div class="btn-row">
            <button type="submit" class="glass-btn danger">確認刪除</button>
            <a href="{% url 'teacher_dashboard' %}" class="glass-btn ghost">取消</a>
          </div>
        </form>
      </div>
    </div>
  </body>
</html>

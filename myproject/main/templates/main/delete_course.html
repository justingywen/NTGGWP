{% extends 'main/base_eduflow.html' %}
{% block title %}刪除課程 | EduFlow{% endblock %}

{% block content %}
<main class="max-w-md mx-auto px-4 py-16">
  <div class="bg-white rounded-2xl ring-1 ring-slate-100 shadow-sm p-8 text-center">
    <div class="text-5xl mb-3">⚠️</div>
    <h1 class="text-2xl font-black text-red-600 mb-2">刪除課程</h1>
    <p class="text-slate-500 mb-6">你確定要刪除「<strong class="text-slate-800">{{ course.title }}</strong>」嗎？<br>刪除後無法復原。</p>
    <form method="post">
      {% csrf_token %}
      <div class="flex gap-3 justify-center">
        <button type="submit" class="bg-red-600 hover:bg-red-700 text-white font-bold px-6 py-3 rounded-lg transition">確認刪除</button>
        <a href="{% url 'teacher_dashboard' %}" class="bg-slate-100 hover:bg-slate-200 text-slate-700 font-bold px-6 py-3 rounded-lg transition">取消</a>
      </div>
    </form>
  </div>
</main>
{% endblock %}
